apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: pihole
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      containers:
        - name: pihole
          image: pihole/pihole:2026.04.0
          env:
            - name: TZ
              value: "America/Chicago"
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: pihole-secret
                  key: api_password
            - name: FTLCONF_dns_upstreams
              value: "8.8.8.8;8.8.4.4"
            - name: FTLCONF_dns_listeningMode
              value: "all"
            - name: FTLCONF_LOCAL_IPV4
              value: "192.168.0.201"
          ports:
            - containerPort: 80
              name: web
            - containerPort: 53
              protocol: TCP
              name: dns-tcp
            - containerPort: 53
              protocol: UDP
              name: dns-udp
          livenessProbe:
            httpGet:
              path: /admin
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 5
          volumeMounts:
            - name: pihole-data
              mountPath: /etc/pihole
          resources:
            requests:
              memory: "128Mi"
              cpu: "500m"
      volumes:
        - name: pihole-data
          persistentVolumeClaim:
            claimName: pihole-pvc
