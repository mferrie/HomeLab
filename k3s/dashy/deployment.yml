apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashy
  labels:
    app: dashy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashy
  template:
    metadata:
      labels:
        app: dashy
    spec:
      containers:
      - name: dashy
        image: lissy93/dashy:latest
        ports:
        - containerPort: 8080
        volumeMounts:                   # ← indented under the container
        - name: dashy-data
          mountPath: /app/user-data
        resources:                      # ← also belongs under the container
          limits:
            memory: "2Gi"
            cpu: "500m"
      volumes:                          # ← sibling of containers, not inside it
      - name: dashy-data
        persistentVolumeClaim:          # ← indented under the volume entry
          claimName: dashy-config-pvc
