apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f compose.yml
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: immich-server
  name: immich-server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: immich-server
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f compose.yml
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: immich-server
    spec:
      containers:
        - image: ghcr.io/immich-app/immich-server:release
          name: immich-server
          ports:
            - containerPort: 2283
              protocol: TCP
          volumeMounts:
            - mountPath: /data
              name: immich-server-claim0
            - mountPath: /etc/localtime
              name: immich-server-cm1
              readOnly: true
              subPath: localtime
      restartPolicy: Always
      volumes:
        - name: immich-server-claim0
          persistentVolumeClaim:
            claimName: immich-server-claim0
        - configMap:
            items:
              - key: localtime
                path: localtime
            name: immich-server-cm1
          name: immich-server-cm1
