apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
labels:
  app: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo
template:
  metadata:
    labels:
      app: forgejo
  spec:
    containers:
    - name: forgejo
      image: codeberg.org/forgejo/forgejo:15
      env:
    - name: USER_UID
      value: "1000"
    - name: USER_GID
      value: "1000"
    ports:
    - containerPort: 3000
      name: http
    - containerPort: 22
      name: ssh
    volumeMounts:
    - name: data
      mountPath: /data
    - name: tz
      mountPath: /etc/localtime
      readOnly: true
    volumes:
    - name: data
      hostPath:
      path: /path/on/node/forgejo        # REPLACE: path on your node to store ./forgejo data
      type: DirectoryOrCreate
    - name: tz
      hostPath:
      path: /usr/share/zoneinfo/Etc/UTC   # REPLACE with your node's zoneinfo file (or /etc/localtime)
      type: File
