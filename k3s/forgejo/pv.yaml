apiVersion: v1
kind: PersistentVolume
metadata:
  name: forgejo-pvc
  namespace: forgejo
spec:
  capacity:
    storage: 10Gi
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: longhorn
  csi:
    driver: driver.longhorn.io
    volumeHandle: forgejo-pvc
    fsType: ext4