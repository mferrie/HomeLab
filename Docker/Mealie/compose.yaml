services:
  mealie-server:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie-server
    ports:
        - "9925:9000"
    deploy:
      resources:
        limits:
          memory: 1000M
    depends_on:
      - mealie-postgres
    volumes:
      - mealie-data:/app/data/
    environment:
    # Set Backend ENV Variables Here
      - ALLOW_SIGNUP=true
      - PUID=1000
      - PGID=1000
      - TZ="America/Chicago"
      - MAX_WORKERS=1
      - WEB_CONCURRENCY=1
      - BASE_URL=${URL}

    # Database Settings
      - DB_ENGINE=postgres
      - POSTGRES_USER=mealie
      - POSTGRES_PASSWORD=${PG_PASS}
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mealie
    restart: always
  mealie-postgres:
    container_name: mealie-postgres
    image: postgres:15
    restart: always
    volumes:
      - ./mealie-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_USER: mealie

volumes:
  mealie-data:
    driver: local
  mealie-pgdata:
    driver: local
